function rebuildSpeciesOptions(district) {
  const pool = district ? TREES.filter(t => t.district === district) : TREES;
  const list = [...new Set(pool.map(t => t.species))].sort();
  const prev = speciesSelect.value;
  speciesSelect.innerHTML = '<option value="">全部樹種</option>';
  list.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    speciesSelect.appendChild(opt);
  });
  if (prev && list.includes(prev)) speciesSelect.value = prev;
}

function filterByDistrict(d) {
  document.getElementById('districtFilter').value = d;
  applyFilters();
}

function applyFilters() {
  const dist = districtSelect.value;
  const spec = speciesSelect.value;
  const search = document.getElementById('search').value.toLowerCase().trim();
  layerGroup.clearLayers();
  let count = 0;
  markers.forEach(m => {
    const t = m.treeData;
    if ((!dist || t.district === dist) && (!spec || t.species === spec) &&
        (!search || t.species.toLowerCase().includes(search) || t.district.toLowerCase().includes(search) || t.sci_name.toLowerCase().includes(search))) {
      layerGroup.addLayer(m); count++;
    }
  });
  document.getElementById('visibleCount').textContent = count + ' 棵';
  if (dist || spec || search) {
    const layers = []; layerGroup.eachLayer(l => layers.push(l));
    if (layers.length > 0) map.fitBounds(L.featureGroup(layers).getBounds().pad(0.1));
  }
}

districtSelect.addEventListener('change', () => {
  rebuildSpeciesOptions(districtSelect.value);
  applyFilters();
});
speciesSelect.addEventListener('change', applyFilters);
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('resetBtn').addEventListener('click', () => {
  districtSelect.value = ''; speciesSelect.value = '';
  document.getElementById('search').value = '';
  rebuildSpeciesOptions('');
  applyFilters();
  map.setView([24.97, 121.45], 11);
});

// ======== 定位功能 ========
let myLocationMarker = null;
let myAccuracyCircle = null;
let nearestMarker = null;

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

document.getElementById('locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation) {
    alert('您的瀏覽器不支援定位功能');
    return;
  }

  // 只有 Android Chrome 在 HTTP 下才需要 HTTPS，iOS Safari 可以直接定位
  const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  if (!isSecure && !isIOS) {
    const go = confirm(
      '⚠️ 定位可能失敗\n\n' +
      'Android Chrome 要求頁面必須透過 HTTPS 才能使用定位。\n' +
      '建議改用 ngrok 建立 HTTPS 通道。\n\n' +
      '仍要繼續嘗試？'
    );
    if (!go) return;
  }

  const btn = document.getElementById('locateBtn');
  btn.classList.add('locating');
  btn.textContent = '⏳ 定位中...';

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    btn.classList.remove('locating');
    btn.textContent = '📍 更新位置';

    // 清除舊的
    if (myLocationMarker) map.removeLayer(myLocationMarker);
    if (myAccuracyCircle) map.removeLayer(myAccuracyCircle);

    // 精確度圓圈
    myAccuracyCircle = L.circle([lat, lng], {
      radius: acc, color: '#4a9eff', fillColor: '#4a9eff',
      fillOpacity: 0.08, weight: 1
    }).addTo(map);

    // 我的位置標記
    const myIcon = L.divIcon({
      className: '',
      html: '<div class="my-location-dot"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8]
    });
    myLocationMarker = L.marker([lat, lng], { icon: myIcon, zIndexOffset: 1000 })
      .addTo(map)
      .bindPopup('<div class="popup-title">📍 您目前的位置</div><div style="font-size:12px;color:#aabbcc">精確度約 ' + Math.round(acc) + ' 公尺</div>');

    map.setView([lat, lng], 15);

    // 找最近的樹
    let nearest = null, minDist = Infinity;
    TREES.forEach(t => {
      const d = haversine(lat, lng, t.lat, t.lng);
      if (d < minDist) { minDist = d; nearest = t; }
    });

    if (nearest) {
      const distStr = minDist < 1000 ? Math.round(minDist) + ' 公尺' : (minDist/1000).toFixed(1) + ' 公里';
      document.getElementById('nearestStat').textContent = '🌳 最近的珍貴樹木：' + nearest.species + '（' + nearest.district + '，距離 ' + distStr + '）';

      // 高亮最近的樹
      if (nearestMarker) map.removeLayer(nearestMarker);
      nearestMarker = L.marker([nearest.lat, nearest.lng], {
        icon: makeIcon('#ff6b35', 16), zIndexOffset: 500
      }).addTo(map);
      const gmapsUrl = `https://www.google.com/maps?q=${nearest.lat},${nearest.lng}`;
      nearestMarker.bindPopup(`
        <div class="popup-title">🌟 最近的珍貴樹木 <span class="nearest-badge">距您 ${distStr}</span></div>
        <div style="font-size:14px;color:#ffaa55;font-weight:bold;">${nearest.species}</div>
        <div class="popup-sci">${nearest.sci_name}</div>
        <div class="popup-row"><span class="popup-key">行政區域</span><span class="popup-val">${nearest.district}</span></div>
        <div class="popup-row"><span class="popup-key">樹高</span><span class="popup-val">${nearest.height > 0 ? nearest.height + ' m' : '未記錄'}</span></div>
        <a class="popup-gmaps" href="${gmapsUrl}" target="_blank">📍 在 Google Maps 查看</a>
      `, { maxWidth: 260 }).openPopup();
    }

  }, err => {
    btn.classList.remove('locating');
    btn.textContent = '📍 定位我的位置';
    const msgs = {
      1: '請允許瀏覽器存取您的位置（在設定或網址列的鎖頭圖示中允許）',
      2: location.protocol !== 'https:' && location.hostname !== 'localhost'
           ? '定位被拒絕 ─ 手機 Chrome 需要 HTTPS 才能定位。\n請改用 ngrok 建立 HTTPS 通道，或在 iOS Safari 上試試。'
           : '無法取得位置資訊，請確認 GPS 已開啟',
      3: '定位逾時，請確認 GPS 已開啟後再試'
    };
    alert('定位失敗 (code ' + err.code + ')：\n\n' + (msgs[err.code] || err.message));
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
});
</script>
</body>
</html>
