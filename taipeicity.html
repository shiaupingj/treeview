  "金龜樹": "#FFA726",
  "錫蘭橄欖": "#80CBC4",
  "香楠": "#AED581",
  "魯花樹": "#CDDC39"
};
function getColor(sp) { return SPECIES_COLORS[sp] || "#aabbcc"; }

const DISTRICT_CENTER = {
  "松山區": [25.057, 121.557, 14],
  "大同區": [25.062, 121.513, 14],
  "南港區": [25.050, 121.590, 14],
};

function createMarkerIcon(color, isNearest=false) {
  const size = isNearest ? 18 : 13;
  const border = isNearest ? "3px solid #fff" : "2px solid rgba(255,255,255,0.6)";
  const shadow = isNearest ? "0 0 0 3px rgba(255,255,255,0.4), 0 2px 8px rgba(0,0,0,0.5)" : "0 1px 4px rgba(0,0,0,0.4)";
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;border:${border};box-shadow:${shadow};"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -size/2-2],
  });
}

const map = L.map('map', { center: [25.057, 121.540], zoom: 13 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 19,
}).addTo(map);

const trees = TREES_RAW.map(t => ({
  code: t[0], species: t[1], speciesEn: t[2],
  district: t[3], village: t[4], address: t[5],
  lat: t[6], lng: t[7], desc: t[8],
}));

let markers = [], currentMarkers = [], myLocMarker = null, nearestMarker = null;

function buildPopup(t, isNearest=false) {
  const gmaps = `https://www.google.com/maps/search/?api=1&query=${t.lat},${t.lng}`;
  const infoUrl = `https://eculture.gov.taipei/trees/zh-tw/tree/${t.code}`;
  const nearBadge = isNearest ? '<span class="nearest-badge">📍 最近</span>' : '';
  const descHtml = t.desc ? `<div class="popup-desc">${t.desc}</div>` : '';
  return `
    <div class="popup-title">${t.species} ${nearBadge}<span class="district-badge">${t.district}</span></div>
    <div class="popup-code">編號：${t.code}　${t.village}</div>
    <div class="popup-sci">${t.speciesEn}</div>
    <div class="popup-row"><span class="popup-key">📍 地址</span><span class="popup-val">${t.address}</span></div>
    <div class="popup-row"><span class="popup-key">🌐 座標</span><span class="popup-val">${t.lat.toFixed(6)}, ${t.lng.toFixed(6)}</span></div>
    ${descHtml}
    <div class="popup-links">
      <a href="${gmaps}" target="_blank" class="popup-gmaps">📍 Google Maps</a>
      <a href="${infoUrl}" target="_blank" class="popup-info">🔗 樹木資訊</a>
    </div>`;
}

trees.forEach(t => {
  const color = getColor(t.species);
  const m = L.marker([t.lat, t.lng], { icon: createMarkerIcon(color) })
    .bindPopup(buildPopup(t), { maxWidth: 340 });
  m._treeData = t;
  markers.push(m);
  m.addTo(map);
});
currentMarkers = [...markers];

// ── 圖例 ─────────────────────────────────────────────────────────────────
const speciesCounts = {};
trees.forEach(t => { speciesCounts[t.species] = (speciesCounts[t.species]||0) + 1; });
const sortedSpecies = Object.entries(speciesCounts).sort((a,b) => b[1]-a[1]);

const legend = L.control({ position: 'topright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h4>樹種</h4>';
  sortedSpecies.forEach(([sp, cnt]) => {
    const color = getColor(sp);
    div.innerHTML += `<div class="legend-item" data-species="${sp}">
      <div class="legend-dot" style="background:${color}"></div>
      <span class="legend-label">${sp}</span>
      <span class="legend-cnt">${cnt}</span></div>`;
  });
  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
  div.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('click', () => {
      const sp = item.dataset.species;
      const sel = document.getElementById('speciesFilter');
      sel.value = sel.value === sp ? '' : sp;
      sel.dispatchEvent(new Event('change'));
    });
  });
  return div;
};
legend.addTo(map);

// ── 下拉選單填充 ──────────────────────────────────────────────────────────
const speciesSel = document.getElementById('speciesFilter');
sortedSpecies.forEach(([sp, cnt]) => {
  speciesSel.innerHTML += `<option value="${sp}">${sp}（${cnt}棵）</option>`;
});

function rebuildVillageOptions(districtFilter) {
  const villageSel = document.getElementById('villageFilter');
  const prevVal = villageSel.value;
  villageSel.innerHTML = '<option value="">全部里別</option>';
  const villages = [...new Set(
    trees.filter(t => !districtFilter || t.district === districtFilter).map(t => t.village).filter(Boolean)
  )].sort();
  villages.forEach(v => { villageSel.innerHTML += `<option value="${v}">${v}</option>`; });
  villageSel.value = villages.includes(prevVal) ? prevVal : '';
}
rebuildVillageOptions('');

// ── 篩選邏輯 ──────────────────────────────────────────────────────────────
function applyFilters() {
  const q  = document.getElementById('search').value.trim().toLowerCase();
  const di = document.getElementById('districtFilter').value;
  const sp = speciesSel.value;
  const vl = document.getElementById('villageFilter').value;

  currentMarkers.forEach(m => map.removeLayer(m));
  currentMarkers = [];

  markers.forEach(m => {
    const t = m._treeData;
    const matchQ  = !q  || t.species.includes(q) || t.address.toLowerCase().includes(q) || t.code.includes(q) || t.village.includes(q) || t.desc.toLowerCase().includes(q);
    const matchDi = !di || t.district === di;
    const matchSp = !sp || t.species === sp;
    const matchVl = !vl || t.village === vl;
    if (matchQ && matchDi && matchSp && matchVl) {
      m.addTo(map); currentMarkers.push(m);
    }
  });

  const n = currentMarkers.length;
  document.getElementById('visibleCount').textContent = n + ' 棵';
  document.getElementById('statVisible').textContent = '顯示：' + n + ' 棵';

  const diSet = new Set(currentMarkers.map(m => m._treeData.district));
  document.getElementById('statDistrict').textContent = '行政區：' + (diSet.size ? [...diSet].join('、') : '—');

  const spSet = new Set(currentMarkers.map(m => m._treeData.species));
  document.getElementById('statSpecies').textContent = '樹種：' + spSet.size + ' 種';

  document.querySelectorAll('.legend-item').forEach(item => {
    item.style.opacity = (!sp || item.dataset.species === sp) ? '1' : '0.35';
  });
}

document.getElementById('search').addEventListener('input', applyFilters);
speciesSel.addEventListener('change', applyFilters);
document.getElementById('villageFilter').addEventListener('change', applyFilters);

document.getElementById('districtFilter').addEventListener('change', function() {
  rebuildVillageOptions(this.value);
  if (this.value && DISTRICT_CENTER[this.value]) {
    const [lat, lng, z] = DISTRICT_CENTER[this.value];
    map.setView([lat, lng], z);
  } else {
    map.setView([25.057, 121.540], 13);
  }
  applyFilters();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('search').value = '';
  document.getElementById('districtFilter').value = '';
  speciesSel.value = '';
  rebuildVillageOptions('');
  applyFilters();
  map.setView([25.057, 121.540], 13);
});

// ── 定位最近的樹 ──────────────────────────────────────────────────────────
document.getElementById('locateBtn').addEventListener('click', () => {
  const btn = document.getElementById('locateBtn');
  btn.classList.add('locating'); btn.textContent = '定位中…';
  navigator.geolocation.getCurrentPosition(pos => {
    btn.classList.remove('locating'); btn.innerHTML = '📍 定位最近的樹';
    const { latitude: uLat, longitude: uLng } = pos.coords;
    if (myLocMarker) map.removeLayer(myLocMarker);
    myLocMarker = L.marker([uLat, uLng], {
      icon: L.divIcon({ className: '', html: '<div class="my-location-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] })
    }).addTo(map).bindPopup('📍 你的位置').openPopup();

    let nearest = null, minDist = Infinity;
    currentMarkers.forEach(m => {
      const t = m._treeData;
      const d = Math.hypot(t.lat - uLat, t.lng - uLng);
      if (d < minDist) { minDist = d; nearest = m; }
    });
    if (!nearest) return;
    const t = nearest._treeData;
    if (nearestMarker) nearestMarker.setIcon(createMarkerIcon(getColor(nearestMarker._treeData.species)));
    nearestMarker = nearest;
    nearest.setIcon(createMarkerIcon(getColor(t.species), true));
    nearest.setPopupContent(buildPopup(t, true));
    map.setView([t.lat, t.lng], 17);
    nearest.openPopup();
  }, () => {
    btn.classList.remove('locating'); btn.innerHTML = '📍 定位最近的樹';
    alert('無法取得位置，請確認瀏覽器位置權限已開啟。');
  });
});

applyFilters();
</script>
</body>
</html>
